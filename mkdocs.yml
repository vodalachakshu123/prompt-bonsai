site_name: Prompt Bonsai
site_description: Intelligent prompt compression for LLMs
site_url: https://prompt-bonsai.readthedocs.io
theme:
  name: material
  palette:
    - scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
  - User Guide:
    - Compression Strategies: user-guide/strategies.md
    - Configuration: user-guide/configuration.md
    - Quality Assessment: user-guide/quality.md
    - Integrations: user-guide/integrations.md
  - API Reference:
    - Compressor: api/compressor.md
    - Config: api/config.md
    - Exceptions: api/exceptions.md
  - Examples: examples.md
  - Benchmarks: benchmarks.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vodalachakshu123/prompt-bonsai
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/prompt-bonsai/

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
